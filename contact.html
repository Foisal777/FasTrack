<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FasTrack</title>
    <style>
        body { margin:0; overflow:hidden; font-family:'Segoe UI','Noto Sans JP',sans-serif; color:white; }
        #canvas-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
        .content { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); backdrop-filter:blur(4px); padding:20px; }
        nav { position:absolute; top:20px; left:0; right:0; display:flex; justify-content:center; gap:20px; z-index:20; }
        nav a { color:#fff; text-decoration:none; font-weight:bold; font-size:1.1rem; text-shadow:0 0 10px black; padding:8px 16px; border-radius:30px; background:rgba(255,255,255,0.15); backdrop-filter:blur(5px); }
        nav a:hover { background:#d6336c; }
        .contact-card { background:rgba(20,10,30,0.8); backdrop-filter:blur(10px); border-radius:30px; padding:40px; max-width:700px; width:90%; text-align:center; border:1px solid #ffb3c6; margin:20px; }
        h1 { font-size:3rem; margin-bottom:20px; }
        .phone { font-size:1.8rem; margin:15px 0; }
        .map-link { display:inline-block; background:#d6336c; color:white; padding:12px 30px; border-radius:40px; text-decoration:none; font-weight:bold; margin:20px 0; }
        footer { position:absolute; bottom:10px; left:0; right:0; text-align:center; z-index:20; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="about.html">👥 About</a>
        <a href="courses.html">📚 Courses</a>
        <a href="culture.html">🎎 Culture</a>
        <a href="contact.html">📞 Contact</a>
    </nav>
    <div class="content">
        <div class="contact-card">
            <h1>📞 Get in Touch</h1>
            <p style="font-size:1.4rem;">A H Tower, Alokar More, Rajshahi, Bangladesh</p>
            <div class="phone">📱 +8801971-199189 (Md. Rubel)</div>
            <div class="phone">📞 +8801756-976864 / +8801835290623</div>
            <a class="map-link" href="https://maps.app.goo.gl/DsPTZQwvTy7EJijY9" target="_blank">📍 Open in Google Maps</a>
            <p style="margin-top:30px;">Developed by <strong>Foisal</strong> | © 2026 FasTrack</p>
        </div>
    </div>
    <footer>© 2026 FasTrack Japanese Language Centre</footer>

    <script type="importmap">
        {"imports": {"three": "https://unpkg.com/three@0.128.0/build/three.module.js"}}
    </script>
    <script type="module">
        import * as THREE from 'three';
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);
        const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);
        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(innerWidth, innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lights
        const light1 = new THREE.PointLight(0xff88aa, 1);
        light1.position.set(5,5,5);
        scene.add(light1);
        const light2 = new THREE.PointLight(0x88aaff, 0.8);
        light2.position.set(-5,3,5);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0x404060));
        
        // 3D Text "FasTrack" using TextGeometry (need font)
        const loader = new THREE.FontLoader();
        loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font){
            const textGeo = new THREE.TextGeometry('FasTrack', {
                font: font,
                size: 1.8,
                height: 0.4,
                curveSegments: 5,
                bevelEnabled: true,
                bevelThickness: 0.03,
                bevelSize: 0.02,
                bevelOffset: 0,
                bevelSegments: 4
            });
            const textMat = new THREE.MeshStandardMaterial({ color: 0xff99cc, emissive: new THREE.Color(0x552233), roughness:0.3, metalness:0.1 });
            const textMesh = new THREE.Mesh(textGeo, textMat);
            textGeo.center();
            textMesh.position.y = 0.5;
            textMesh.castShadow = true;
            textMesh.receiveShadow = true;
            scene.add(textMesh);
            
            // Add a second line "日本語"
            const jpGeo = new THREE.TextGeometry('日本語センター', {
                font: font,
                size: 0.8,
                height: 0.2,
                curveSegments: 4
            });
            const jpMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
            const jpMesh = new THREE.Mesh(jpGeo, jpMat);
            jpGeo.center();
            jpMesh.position.y = -0.8;
            jpMesh.castShadow = true;
            scene.add(jpMesh);
        });
        
        // Floating particles
        const particlesGeo = new THREE.BufferGeometry();
        const count = 800;
        const pos = new Float32Array(count*3);
        for(let i=0;i<count*3;i+=3){
            pos[i] = (Math.random()-0.5)*20;
            pos[i+1] = (Math.random()-0.5)*10;
            pos[i+2] = (Math.random()-0.5)*20;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
        const particlesMat = new THREE.PointsMaterial({color:0xffaacc, size:0.05});
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);
        
        let clock = new THREE.Clock();
        function animate(){
            requestAnimationFrame(animate);
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', ()=>{
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
